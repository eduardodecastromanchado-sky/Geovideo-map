version: '3.8'

services:
  backend:
    build: ./backend
    container_name: geovideo-backend
    ports:
      - "8080:8080"
    environment:
      # This URL points to your external database
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.3.75:3306/openclaw
      SPRING_DATASOURCE_USERNAME: goku
      SPRING_DATASOURCE_PASSWORD: GokuBot2026!
      # Update this if you have an external Redis, currently pointing to same host
      SPRING_REDIS_HOST: 192.168.3.75

  frontend:
    build: ./frontend
    container_name: geovideo-frontend
    ports:
      - "80:80"
