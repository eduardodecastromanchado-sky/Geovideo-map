version: '3.8'

services:
  # NOTE: This setup assumes you are running the MySQL database container.
  # If you are connecting to an external DB, you can comment out the 'db' service.
  db:
    image: mysql:8.0
    container_name: geovideo-db
    environment:
      # IMPORTANT: Change this root password
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: openclaw
      MYSQL_USER: goku
      MYSQL_PASSWORD: GokuBot2026!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:6.2-alpine
    container_name: geovideo-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: geovideo-backend
    ports:
      - "8080:8080"
    environment:
      # This URL points to the 'db' service defined above
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.3.75:3306/openclaw
      SPRING_DATASOURCE_USERNAME: goku
      SPRING_DATASOURCE_PASSWORD: GokuBot2026!
      SPRING_REDIS_HOST: redis
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: geovideo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
